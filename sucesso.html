<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike - Bem-vindo ao Time</title>
    <link rel="stylesheet" href="nike-style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">NIKE</div>
        <div class="menu">
            <span>Lançamentos</span>
            <span>Masculino</span>
            <span>Feminino</span>
            <span>Membros</span>
        </div>
    </nav>

    <main class="hero">
        <div class="content">
            <h1>JUST DONE IT.</h1>
            <p>Seu acesso exclusivo à nova era do Air foi liberado.</p>
            <div class="buttons">
                <button class="btn-black">Comprar Agora</button>
                <button class="btn-white">Ver Detalhes</button>
            </div>
        </div>
        
        <div class="product-showcase">
            <div class="card">
                <div class="img-container">
                    <img src="https://imgnike-a.akamaihd.net/768x768/02898351A1.jpg" alt="Air Max DN Branco">
                </div>
                <div class="card-info">
                    <span class="tag">Novo</span>
                    <h3>Air Max DN Branco</h3>
                    <p>Sinta o irreal. A próxima geração da tecnologia Air.</p>
                    <span class="price">R$ 1.299,99</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
