<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike - Bem-vindo</title>
    <link rel="stylesheet" href="nike-style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">NIKE</div>
        <div class="menu">
            <span>New Releases</span>
            <span>Men</span>
            <span>Women</span>
            <span>Kids</span>
        </div>
    </nav>

    <main class="hero">
        <div class="content">
            <h1>JUST DONE IT.</h1>
            <p>Seu cadastro foi processado com sucesso em nossa base de membros elite.</p>
            <div class="buttons">
                <button class="btn-black">Ver Coleção</button>
                <button class="btn-white">Saiba Mais</button>
            </div>
        </div>
        
        <div class="product-grid">
            <div class="card">
                <div class="img-placeholder"></div>
                <h3>Air Max 270</h3>
                <p>Casual Style</p>
            </div>
            <div class="card">
                <div class="img-placeholder"></div>
                <h3>Jordan Retro</h3>
                <p>Basketball</p>
            </div>
        </div>
    </main>
</body>
</html>
